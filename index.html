<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HudsaRay</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    
    <!-- Ringbearer Font -->
    <link href="https://fonts.cdnfonts.com/css/ringbearer" rel="stylesheet">
    
    <link rel="stylesheet" href="hudsaray.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #000000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Textura sutil */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            padding: 60px 20px 40px;
            flex: 1; /* Faz o conteúdo ocupar o espaço disponível */
        }
        
        .fotocircular {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 8px solid #b8860b;
            box-shadow: 0 0 35px rgba(184, 134, 11, 0.7),
                        inset 0 0 25px rgba(0,0,0,0.9);
            object-fit: cover;
        }
        
        .titulo {
            font-family: 'Ringbearer', serif;
            font-size: 58px;
            font-weight: bold;
            color: #e8c670;
            margin-top: 25px;
            text-shadow: 
                0 0 12px rgba(232, 198, 112, 0.9),
                4px 4px 10px rgba(0, 0, 0, 0.95);
            letter-spacing: 4px;
        }
        
        .container-links {
            margin-top: 45px;
        }
        
        .container-links a {
            font-size: 78px;
            margin: 0 25px;
            color: #d4af37;
            text-decoration: none;
            transition: all 0.4s ease;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        
        .container-links a:hover {
            color: #ffd700;
            transform: scale(1.28) rotate(8deg);
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.9);
        }

        /* ==================== RODAPÉ ==================== */
        footer {
            position: relative;
            z-index: 2;
            padding: 25px 20px;
            border-top: 1px solid rgba(184, 134, 11, 0.3);
            margin-top: auto;   /* Empurra o rodapé para o final */
        }

        .rodape-texto {
            font-family: 'Ringbearer', serif;
            font-size: 23px;
            color: #c9a66b;
            text-shadow: 0 0 8px rgba(201, 166, 107, 0.5);
            letter-spacing: 2px;
        }
        @media (max-width: 768px) {
        .titulo {
        font-size: 42px;
        margin-top: 18px;
        letter-spacing: 3px;
    }
            .fotocircular {
        width: 180px;
        height: 180px;
        border-width: 6px;
        margin: 0 auto;
    }

    .titulo {
        font-size: 42px;
        margin-top: 18px;
        letter-spacing: 2px;
    }

    .container-links {
        margin-top: 35px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 25px;
    }

    .container-links a {
        font-size: 62px;
        margin: 0;
    }

    /* Ajuste fino no padding geral para telas menores */
    .content {
        padding: 40px 20px 30px;
    }
}
    </style>
</head>
<body>

    <div class="content">
        <figure>
            <img src="foto4k.png" alt="HudsaRay" class="fotocircular">
            <figcaption class="titulo">
                HudsaRay
            </figcaption>
        </figure>

        <div class="container-links">
            <a href="https://discord.com/users/1241414257480830996" target="_blank" title="Discord">
                <i class="fa-brands fa-discord"></i>
            </a>
            <a href="https://steamcommunity.com/id/Hudsaray/" target="_blank" title="Steam">
                <i class="fa-brands fa-steam"></i>
            </a>
            <a href="https://account.xbox.com/pt-BR/profile?gamertag=hudsaray" target="_blank" title="Xbox">
                <i class="fa-brands fa-xbox"></i>
            </a>
        </div>
    </div>

    <!-- Rodapé -->
    <footer>
        <p class="rodape-texto">Gameplay em Desordem</p>
    </footer>

    <script src="javascript/doc.js"></script>
</body>
</html>
